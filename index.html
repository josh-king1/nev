<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAU Navigator | Live GPS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
        }

        #map {
            height: 60vh;
            width: 100%;
            z-index: 1;
        }

        /* Live Pulse Marker */
        .user-dot {
            width: 16px;
            height: 16px;
            background: #2563eb;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.8);
        }

        .pulse-ring {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #2563eb;
            border-radius: 50%;
            animation: pulse 2s infinite;
            opacity: 0;
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body class="pb-24">

    <div class="p-6 bg-white border-b">
        <h1 class="text-xl font-800 text-gray-900 flex items-center gap-2">
            <i data-lucide="map-pin" class="text-blue-600"></i>
            AAU Campus Navigator
        </h1>
        <div class="flex items-center gap-2 mt-2">
            <div id="gps-status" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            <p id="coords" class="text-xs font-mono text-gray-500 uppercase tracking-tighter">Initializing GPS...</p>
        </div>
    </div>

    <div id="map" class="border-b shadow-inner"></div>

    <div class="p-6 max-w-xl mx-auto">
        <div class="flex items-center justify-between mb-4">
            <h2 class="font-bold text-gray-800">Campus Faculties</h2>
            <button onclick="recenterMap()" class="p-2 bg-blue-600 text-white rounded-full shadow-lg active:scale-95 transition">
                <i data-lucide="locate"></i>
            </button>
        </div>

        <div id="faculty-list" class="grid grid-cols-1 gap-3">
            </div>
    </div>

    <div id="nav-overlay" class="fixed bottom-6 left-6 right-6 bg-blue-600 text-white p-4 rounded-3xl shadow-2xl hidden z-[2000] animate-bounce-short">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-80">Destination</p>
                <h3 id="target-name" class="font-bold text-lg leading-tight">Faculty Name</h3>
            </div>
            <button onclick="stopNavigation()" class="bg-white/20 p-2 rounded-full"><i data-lucide="x"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 1. Coordinates for AAU Main Campus Faculties (Estimated)
        const FACULTIES = [
            { name: "Faculty of Physical Sciences", lat: 6.7428, lon: 6.1405 },
            { name: "Faculty of Life Sciences", lat: 6.7430, lon: 6.1408 },
            { name: "Faculty of Engineering & Tech", lat: 6.7440, lon: 6.1385 },
            { name: "Faculty of Law", lat: 6.7425, lon: 6.1412 },
            { name: "Faculty of Social Sciences", lat: 6.7437, lon: 6.1399 },
            { name: "Faculty of Arts", lat: 6.7432, lon: 6.1397 },
            { name: "Faculty of Management Sciences", lat: 6.7435, lon: 6.1418 },
            { name: "Faculty of Agriculture", lat: 6.7445, lon: 6.1403 },
            { name: "Faculty of Education", lat: 6.7440, lon: 6.1422 }
        ];

        let map, userMarker, accuracyCircle, routeLine;
        let userPos = null;

        function initMap() {
            // Center on AAU Main Gate area
            map = L.map('map', { zoomControl: false }).setView([6.7430, 6.1400], 15);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            // Add Faculty Markers
            FACULTIES.forEach(f => {
                L.marker([f.lat, f.lon]).addTo(map)
                    .bindPopup(`<b>${f.name}</b><br>Ekpoma, Edo State`);
                
                addFacultyBtn(f);
            });

            startLiveTracking();
        }

        function addFacultyBtn(f) {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 bg-white border border-gray-100 rounded-2xl flex justify-between items-center hover:bg-blue-50 transition active:scale-[0.98]";
            btn.innerHTML = `
                <span class="font-semibold text-gray-700">${f.name}</span>
                <i data-lucide="navigation-2" class="w-4 h-4 text-blue-500"></i>
            `;
            btn.onclick = () => startNavigation(f);
            document.getElementById('faculty-list').appendChild(btn);
            lucide.createIcons();
        }

        function startLiveTracking() {
            if (!navigator.geolocation) return alert("Geolocation not supported");

            navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    userPos = [latitude, longitude];

                    // Update Status UI
                    document.getElementById('gps-status').classList.replace('bg-red-500', 'bg-green-500');
                    document.getElementById('coords').innerText = `LAT: ${latitude.toFixed(5)} | LON: ${longitude.toFixed(5)} (±${Math.round(accuracy)}m)`;

                    // Update Map Marker
                    if (!userMarker) {
                        const icon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div class="pulse-ring"></div><div class="user-dot"></div>`,
                            iconSize: [40, 40],
                            iconAnchor: [20, 20]
                        });
                        userMarker = L.marker(userPos, { icon }).addTo(map);
                        accuracyCircle = L.circle(userPos, { radius: accuracy, color: '#2563eb', weight: 1, fillOpacity: 0.1 }).addTo(map);
                        map.flyTo(userPos, 17);
                    } else {
                        userMarker.setLatLng(userPos);
                        accuracyCircle.setLatLng(userPos).setRadius(accuracy);
                    }
                },
                (err) => console.error(err),
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }

        function startNavigation(f) {
            if (!userPos) return alert("Waiting for your GPS location...");
            
            // Draw a simple direct line (or use OSRM for road-following)
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline([userPos, [f.lat, f.lon]], { color: '#2563eb', weight: 4, dashArray: '10, 10' }).addTo(map);
            
            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
            document.getElementById('target-name').innerText = f.name;
            document.getElementById('nav-overlay').classList.remove('hidden');
        }

        function recenterMap() {
            if (userPos) map.flyTo(userPos, 18);
        }

        function stopNavigation() {
            if (routeLine) map.removeLayer(routeLine);
            document.getElementById('nav-overlay').classList.add('hidden');
        }

        window.onload = initMap;
    </script>
</body>
</html>
