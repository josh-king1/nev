<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAU Campus Navigator - Real Time</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
    font-family:'Inter',sans-serif;
    background:#f3f4f6;
    padding-top:1rem;
    padding-bottom:6rem;
}
#map{
    height:450px;
    width:100%;
}
</style>
</head>

<body class="px-4">

<div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl p-6">

<header class="text-center mb-8">
<h1 class="text-3xl font-bold flex items-center justify-center space-x-2">
<i data-lucide="map-pin" class="w-8 h-8 text-blue-600"></i>
<span>AAU Campus Navigator</span>
</h1>
<p class="text-gray-500 mt-2">
Ambrose Alli University, Ekpoma, Nigeria
</p>
</header>

<div class="bg-blue-50 p-4 rounded-lg mb-6">
<p class="font-semibold text-blue-700">Your Live Location:</p>
<p id="locationDisplay" class="text-sm text-gray-700">Detecting...</p>
</div>

<div id="map" class="rounded-xl shadow-lg mb-6"></div>

<div id="routeInfo" class="hidden bg-green-50 border-l-4 border-green-600 p-4 rounded-lg mb-6">
<h3 class="font-bold text-green-700">Navigation Info</h3>
<p id="distanceInfo"></p>
<p id="durationInfo"></p>
</div>

<h2 class="text-xl font-bold mb-4">Faculties</h2>
<div id="facultyList" class="grid sm:grid-cols-2 gap-4"></div>

</div>

<!-- ABOUT MODAL -->
<div id="aboutModal" class="fixed inset-0 hidden items-center justify-center bg-black/60 z-[9999]">
<div id="aboutContent"
class="bg-white w-[90%] max-w-md rounded-2xl shadow-2xl p-6 transform scale-95 opacity-0 transition duration-300">
<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold">About</h2>
<button onclick="closeAboutUs()" class="text-red-500 text-xl">&times;</button>
</div>
<p>
AAU Smart Campus Navigator provides real-time GPS tracking,
walking routes, and live campus navigation.
</p>
<button onclick="closeAboutUs()"
class="mt-6 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
Close
</button>
</div>
</div>

<!-- FIXED BOTTOM NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-blue-600 shadow-lg z-50">
<div class="flex justify-around items-center h-16">
<button onclick="goToHome()" class="text-blue-600">
<i data-lucide="home" class="w-7 h-7"></i>
</button>
<button onclick="showAboutUsInfo()" class="text-gray-600">
<i data-lucide="info" class="w-7 h-7"></i>
</button>
</div>
</div>

<script>
lucide.createIcons();

let map, userMarker, accuracyCircle, destinationMarker, routeLine;
let userLat=null, userLon=null;
let selectedFaculty=null;

const FACULTIES=[
{name:"Faculty of Agriculture",lat:6.7445,lon:6.1403},
{name:"Faculty of Arts",lat:6.7432,lon:6.1397},
{name:"Faculty of Basic Medical Sciences",lat:6.7415,lon:6.1380},
{name:"Faculty of Clinical Sciences",lat:6.7410,lon:6.1375},
{name:"Faculty of Education",lat:6.7440,lon:6.1422},
{name:"Faculty of Engineering & Technology",lat:6.7440,lon:6.1385},
{name:"Faculty of Environmental Studies",lat:6.7420,lon:6.1430},
{name:"Faculty of Law",lat:6.7425,lon:6.1412},
{name:"Faculty of Life Sciences",lat:6.7430,lon:6.1408},
{name:"Faculty of Management Sciences",lat:6.7435,lon:6.1418},
{name:"Faculty of Physical Sciences",lat:6.7428,lon:6.1405},
{name:"Faculty of Social Sciences",lat:6.7437,lon:6.1399}
];

window.onload=function(){
map=L.map('map').setView([6.7430,6.1400],16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

renderFaculties();
startLiveTracking();
};

function startLiveTracking(){
if(!navigator.geolocation){
alert("Geolocation not supported");
return;
}

navigator.geolocation.watchPosition(function(pos){

userLat=pos.coords.latitude;
userLon=pos.coords.longitude;
const accuracy=pos.coords.accuracy;

document.getElementById("locationDisplay").innerHTML=
`Lat: ${userLat.toFixed(5)} | Lon: ${userLon.toFixed(5)}`;

if(!userMarker){
userMarker=L.marker([userLat,userLon]).addTo(map).bindPopup("You are here");
accuracyCircle=L.circle([userLat,userLon],{radius:accuracy}).addTo(map);
}else{
userMarker.setLatLng([userLat,userLon]);
accuracyCircle.setLatLng([userLat,userLon]);
accuracyCircle.setRadius(accuracy);
}

map.setView([userLat,userLon],17);

if(selectedFaculty){
navigateToFaculty(selectedFaculty,true);
}

},{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
});
}

function renderFaculties(){
const container=document.getElementById("facultyList");
FACULTIES.forEach(f=>{
L.marker([f.lat,f.lon]).addTo(map).bindPopup(f.name);

const div=document.createElement("div");
div.className="bg-gray-50 p-4 rounded-lg shadow";
div.innerHTML=`
<h3 class="font-semibold">${f.name}</h3>
<button onclick='navigateToFaculty(${JSON.stringify(f)})'
class="mt-2 bg-green-600 text-white px-3 py-1 rounded">
Navigate
</button>`;
container.appendChild(div);
});
}

async function navigateToFaculty(f,auto=false){
if(!userLat)return;

selectedFaculty=f;

if(destinationMarker)map.removeLayer(destinationMarker);
if(routeLine)map.removeLayer(routeLine);

destinationMarker=L.marker([f.lat,f.lon]).addTo(map).bindPopup(f.name);

const url=`https://router.project-osrm.org/route/v1/foot/${userLon},${userLat};${f.lon},${f.lat}?overview=full&geometries=geojson`;
const res=await fetch(url);
const data=await res.json();

if(!data.routes.length)return;

routeLine=L.geoJSON(data.routes[0].geometry,{
style:{color:"blue",weight:6}
}).addTo(map);

const distance=(data.routes[0].distance/1000).toFixed(2);
const duration=(data.routes[0].duration/60).toFixed(1);

document.getElementById("routeInfo").classList.remove("hidden");
document.getElementById("distanceInfo").innerHTML=`Distance: ${distance} km`;
document.getElementById("durationInfo").innerHTML=`Walking Time: ${duration} mins`;
}

function goToHome(){
map.setView([userLat,userLon],17);
}

function showAboutUsInfo(){
const modal=document.getElementById("aboutModal");
const content=document.getElementById("aboutContent");
modal.classList.remove("hidden");
modal.classList.add("flex");
setTimeout(()=>{
content.classList.remove("scale-95","opacity-0");
content.classList.add("scale-100","opacity-100");
},10);
}

function closeAboutUs(){
const modal=document.getElementById("aboutModal");
const content=document.getElementById("aboutContent");
content.classList.remove("scale-100","opacity-100");
content.classList.add("scale-95","opacity-0");
setTimeout(()=>{
modal.classList.add("hidden");
modal.classList.remove("flex");
},300);
}
</script>

</body>
</html>
